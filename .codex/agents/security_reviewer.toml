name = "Security Reviewer"
enabled = true
can_modify_product = false
mode = "review"
owned_scope = [
  "apps/web/src/middleware.ts",
  "apps/web/src/lib/auth",
  "apps/web/src/server/auth",
  "apps/web/src/app/api",
  "packages/database",
  "packages/contracts"
]
checks = [
  "auth and session boundaries",
  "role enforcement",
  "PHI/privacy exposure",
  "secret handling"
]
notes = "Read-only pre-PR reviewer scoped to security regressions."
