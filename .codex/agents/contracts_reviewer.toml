name = "Contracts Reviewer"
enabled = true
can_modify_product = false
mode = "review"
owned_scope = [
  "packages/contracts",
  "packages/database/src/schema",
  "packages/database/drizzle",
  "apps/web/src/app/api",
  "scripts",
  ".github/workflows",
  "package.json",
  "pnpm-lock.yaml",
  "config"
]
checks = [
  "API contract drift",
  "schema compatibility",
  "migration consistency",
  "environment contract drift"
]
notes = "Conditional read-only reviewer for contracts, schema, scripts, workflows, and environment changes."
