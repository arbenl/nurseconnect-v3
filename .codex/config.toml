sandbox_mode = "workspace-write"
approval_policy = "on-request"
evidence_root = "/tmp/nurseconnect-evidence"
features.multi_agent = true

[agents]
max_threads = 5
max_depth = 1

[profiles.prepr]
model = "gpt-5.5"
model_reasoning_effort = "high"
approval_policy = "never"
sandbox_mode = "workspace-write"

[mcp_servers.context7]
command = "npx"
args = ["-y", "@upstash/context7-mcp@2.1.8"]

[mcp_servers.playwright]
command = "npx"
args = [
  "-y",
  "@playwright/mcp@0.0.70",
  "--user-data-dir",
  "/Users/arbenlila/development/nurseconnect-v3/.codex/playwright-profile",
  "--output-dir",
  "/Users/arbenlila/development/nurseconnect-v3/.codex/playwright-output",
]

[mcp_servers.nurseconnect_qa]
command = "bash"
args = ["scripts/start-repo-qa.sh"]
cwd = "."

[mcp_servers.nurse_qa]
command = "bash"
args = ["scripts/start-repo-qa.sh"]
cwd = "."

[mcp_servers.nurse_qa.tools.slice_evidence_audit]
approval_mode = "approve"

[roles.scribe]
config = ".codex/agents/scribe.toml"
enabled = true

[roles.atlas]
config = ".codex/agents/atlas.toml"
enabled = true

[roles.forge]
config = ".codex/agents/forge.toml"
enabled = true

[roles.pixel]
config = ".codex/agents/pixel.toml"
enabled = true

[roles.gatekeeper]
config = ".codex/agents/gatekeeper.toml"
enabled = true

[roles.sentinel]
config = ".codex/agents/sentinel.toml"
enabled = true

[roles.security_reviewer]
config = ".codex/agents/security_reviewer.toml"
