# Project identification
sonar.projectKey=arbenl_nurseconnect-v3
sonar.projectName=nurseconnect-v3
sonar.projectVersion=1.0
sonar.host.url=http://localhost:9000

# Provide tokens at runtime only:
#   export SONAR_TOKEN='...'

# TypeScript analysis can be memory hungry in this monorepo.
sonar.javascript.node.maxspace=4096

# Source directories
sonar.sources=apps/web/src,packages/contracts/src,packages/database/src,packages/domain-admin-ops/src,packages/domain-dispatch/src,packages/domain-identity/src,packages/domain-nurse/src,packages/domain-payments/src,packages/domain-referral/src,packages/domain-request/src,packages/domain-visit/src,packages/platform-telemetry/src,packages/ui/src
sonar.exclusions=**/node_modules/**,**/dist/**,**/.next/**,**/.turbo/**,**/test-results/**,**/playwright-report/**,**/coverage/**,**/artifacts/**,**/.codex/**,**/*.test.ts,**/*.spec.ts,**/*.test.tsx,**/*.spec.tsx

# Test files
sonar.tests=apps/web/src,packages
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx
sonar.test.exclusions=**/node_modules/**,**/dist/**,**/.next/**,**/.turbo/**

sonar.sourceEncoding=UTF-8
sonar.typescript.tsconfigPaths=apps/web/tsconfig.json,packages/contracts/tsconfig.json,packages/database/tsconfig.json,packages/domain-admin-ops/tsconfig.json,packages/domain-dispatch/tsconfig.json,packages/domain-identity/tsconfig.json,packages/domain-nurse/tsconfig.json,packages/domain-payments/tsconfig.json,packages/domain-referral/tsconfig.json,packages/domain-request/tsconfig.json,packages/domain-visit/tsconfig.json,packages/platform-telemetry/tsconfig.json,packages/ui/tsconfig.json

# JavaScript/TypeScript coverage
sonar.javascript.lcov.reportPaths=apps/web/coverage/lcov.info,apps/web/coverage/node/lcov.info,packages/contracts/coverage/lcov.info,packages/database/coverage/lcov.info,packages/database/coverage/db/lcov.info,packages/domain-admin-ops/coverage/lcov.info,packages/domain-dispatch/coverage/lcov.info,packages/domain-identity/coverage/lcov.info,packages/domain-identity/coverage/db/lcov.info,packages/domain-nurse/coverage/lcov.info,packages/domain-payments/coverage/lcov.info,packages/domain-payments/coverage/db/lcov.info,packages/domain-referral/coverage/lcov.info,packages/domain-request/coverage/lcov.info,packages/domain-visit/coverage/lcov.info,packages/platform-telemetry/coverage/lcov.info

# SCM and quality gate behavior
sonar.scm.disabled=false
sonar.scm.provider=git
sonar.scm.exclusions.disabled=false
sonar.qualitygate.wait=true
sonar.issues.ignore.suppressed=true

# Ignore hard-coded password findings only in deterministic tests and local seeds.
sonar.issue.ignore.multicriteria=e1,e2,e3,e4,e5
sonar.issue.ignore.multicriteria.e1.ruleKey=typescript:S2068
sonar.issue.ignore.multicriteria.e1.resourceKey=**/*.test.ts
sonar.issue.ignore.multicriteria.e2.ruleKey=typescript:S2068
sonar.issue.ignore.multicriteria.e2.resourceKey=**/*.test.tsx
sonar.issue.ignore.multicriteria.e3.ruleKey=typescript:S2068
sonar.issue.ignore.multicriteria.e3.resourceKey=**/tests/e2e*/**/*.ts
sonar.issue.ignore.multicriteria.e4.ruleKey=typescript:S2068
sonar.issue.ignore.multicriteria.e4.resourceKey=packages/database/src/seed*/**
sonar.issue.ignore.multicriteria.e5.ruleKey=typescript:S2068
sonar.issue.ignore.multicriteria.e5.resourceKey=scripts/**/*seed*.ts
