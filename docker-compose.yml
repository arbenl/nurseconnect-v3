services:
  sonar-db:
    image: postgres:15-alpine
    profiles:
      - sonar
    environment:
      POSTGRES_USER: sonar
      POSTGRES_PASSWORD: sonar
      POSTGRES_DB: sonarqube
    volumes:
      - nurseconnect_sonar_db_data:/var/lib/postgresql/data

  sonarqube:
    image: sonarqube:lts-community
    profiles:
      - sonar
    depends_on:
      - sonar-db
    ports:
      - "${DOCKER_SONAR_PORT:-9000}:9000"
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://sonar-db:5432/sonarqube
      SONAR_JDBC_USERNAME: sonar
      SONAR_JDBC_PASSWORD: sonar
    volumes:
      - nurseconnect_sonar_data:/opt/sonarqube/data
      - nurseconnect_sonar_extensions:/opt/sonarqube/extensions
      - nurseconnect_sonar_logs:/opt/sonarqube/logs

  postgres:
    image: postgres:16-alpine
    container_name: nurseconnect_postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: nurseconnect
      POSTGRES_USER: nurseconnect
      POSTGRES_PASSWORD: nurseconnect
    volumes:
      - nurseconnect_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nurseconnect -d nurseconnect"]
      interval: 3s
      timeout: 3s
      retries: 20

volumes:
  nurseconnect_pgdata:
  nurseconnect_sonar_data:
  nurseconnect_sonar_extensions:
  nurseconnect_sonar_logs:
  nurseconnect_sonar_db_data:
